<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简 GPT 原理互动教学 - 像考试一样理解 AI</title>
    <!-- 加载 Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <!-- 引入字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #c8a86e;
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-color: #e0e0e0;
            --code-bg: #1e1e1e;
            --border-color: #3d3d3d;
            --success-color: #4caf50;
            --running-color: #c8a86e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部导航 */
        .header {
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; color: #aaa; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 主体内容 */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        .step-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 40px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .step-card.running { border-color: var(--running-color); box-shadow: 0 0 10px rgba(200, 168, 110, 0.2); }
        .step-card.done { border-color: var(--success-color); }

        .step-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .step-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-words {
            background: rgba(200, 168, 110, 0.1);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .new-words b { color: var(--primary-color); }

        .explanation {
            padding: 20px;
            font-size: 1rem;
            color: #ccc;
        }

        .code-editor {
            position: relative;
            background: var(--code-bg);
            padding: 0;
        }

        textarea {
            width: 100%;
            background: transparent;
            color: #d4d4d4;
            border: none;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            padding: 20px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            min-height: 100px;
        }

        .run-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border-color);
        }

        .status-info { font-size: 0.8rem; color: #888; }

        .output-area {
            background: #000;
            color: #00ff00;
            font-family: 'Fira Code', monospace;
            padding: 15px 20px;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
        }

        .output-area.show { display: block; }

        /* 进度条 */
        .progress-container {
            height: 4px;
            background: #333;
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.1s;
        }

        /* 加载动画 */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: var(--primary-color);">正在准备 AI 教室（Pyodide 加载中...）</p>
</div>

<div class="header">
    <h1>GPT 核心原理拆解</h1>
    <p class="subtitle">基于 Karpathy 的 microgpt 原始算法逻辑</p>
    <div class="controls">
        <button id="run-all">全部运行</button>
        <button id="reset-btn">重置教室</button>
    </div>
</div>

<div class="container" id="steps-container">
    <!-- 代码块将由 JS 动态生成 -->
</div>

<script>
    const STEPS = [
        {
            title: "第一节：教材准备 (Dataset)",
            newWords: "<b>数据集 (Dataset)</b> = “教材”：AI 学习的所有知识来源。在这里是 160 个英文名字。",
            explanation: "在开始学习前，我们需要一份教材。我们的任务是让 AI 学习英文名字的拼写规律。",
            code: `data = "Liam,Emma,Noah,Olivia,William,Ava,James,Isabella,Oliver,Sophia,Benjamin,Mia,Elijah,Charlotte,Lucas,Amelia,Mason,Evelyn,Logan,Abigail,Alexander,Harper,Ethan,Emily,Jacob,Elizabeth,Michael,Avery,Daniel,Sofia,Henry,Ella,Jackson,Madison,Sebastian,Scarlett,Aiden,Victoria,Matthew,Aria,Samuel,Grace,David,Chloe,Joseph,Camila,Carter,Penelope,Owen,Riley,Wyatt,Layla,John,Lillian,Jack,Nora,Luke,Zoey,Jayden,Mila,Dylan,Aubrey,Grayson,Hannah,Levi,Stella,Isaac,Natalie,Gabriel,Zoe,Julian,Leah,Mateo,Hazel,Anthony,Violet,Jaxon,Aurora,Lincoln,Savannah,Joshua,Audrey,Christopher,Bella,Andrew,Brooklyn,Theodore,Claire,Caleb,Skylar,Ryan,Lucy,Asher,Paisley,Nathan,Everly,Thomas,Anna,Leo,Caroline,Isaiah,Nova,Charles,Genesis,Josiah,Emilia,Hudson,Kennedy,Christian,Samantha,Hunter,Maya,Connor,Willow,Eli,Kinsley,Ezra,Naomi,Aaron,Aaliyah,Landon,Elena,Adrian,Sarah,Jonathan,Ariana,Nolan,Allison,Jeremiah,Gabriella,Easton,Alice,Elias,Madelyn,Colton,Cora,Cameron,Ruby,Carson,Eva,Robert,Serenity,Angel,Autumn,Maverick,Adeline,Nicholas,Hailey,Dominic,Gianna,Jaxson,Valentina"
print(f"教材准备就绪！包含 {len(data.split(','))} 个名字。")
print(f"教材前 50 个字符: {data[:50]}...")`,
        },
        {
            title: "第二节：翻译官 (Tokenizer)",
            newWords: "<b>标记生成器 (Tokenizer)</b> = “翻译官”：把人类的文字翻译成 AI 能听懂的数字。在这里我们给每个字母一个编号。",
            explanation: "AI 只认识数字。我们需要把字母转换成数字索引（比如 a=1, b=2）。",
            code: `chars = sorted(list(set(data)))
vocab_size = len(chars)
stoi = { ch:i for i,ch in enumerate(chars) }

print(f"字母表: {''.join(chars)}")

try:
    print(f"测试翻译 '{test_str}': {encode(test_str)}")
except KeyError as e:
    print(f"无法翻译 '{test_str}'，因为教材中没有某些字母。")`,
        },
        {
            title: "第三节：自动批改引擎 (Value 类)",
            newWords: "<b>自动微分 (Autograd)</b> = “自动批改”：记录每个数字对结果的影响，方便后续修改错误。微积分在这里就是自动计算谁该为错误负责。",
            explanation: "这是 GPT 的灵魂。`Value` 类会记住它的「身世」（谁计算出了它），以便「自动批改」。",
            code: `import math

class Value:
    def __init__(self, data, _children=(), _op=''):
        self.data, self.grad, self._prev = data, 0, set(_children)
        self._backward = lambda: None
    
    def __add__(self, other):
        other = other if isinstance(other, Value) else Value(other)
        out = Value(self.data + other.data, (self, other), '+')
        def _backward():
            self.grad += out.grad
            other.grad += out.grad
        out._backward = _backward
        return out

    def __mul__(self, other):
        other = other if isinstance(other, Value) else Value(other)
        out = Value(self.data * other.data, (self, other), '*')
        def _backward():
            self.grad += other.data * out.grad
            other.grad += self.data * out.grad
        out._backward = _backward
        return out
    
    def __pow__(self, other):
        out = Value(self.data**other, (self,), f'**{other}')
        def _backward(): self.grad += (other * self.data**(other-1)) * out.grad
        out._backward = _backward
        return out

    def relu(self):
        out = Value(0 if self.data < 0 else self.data, (self,), 'ReLU')
        def _backward(): self.grad += (out.data > 0) * out.grad
        out._backward = _backward
        return out

    def backward(self):
        topo, visited = [], set()
        def build_topo(v):
            if v not in visited:
                visited.add(v)
                for child in v._prev: build_topo(child)
                topo.append(v)
        build_topo(self)
        self.grad = 1
        for v in reversed(topo): v._backward()

    def __radd__(self, other): return self + other
    def __rmul__(self, other): return self * other
    def __sub__(self, other): return self + (other * -1)
    def __truediv__(self, other): return self * (other**-1)
    def __repr__(self): return f"Value(data={self.data}, grad={self.grad})"

print("自动批改引擎 (Value 类) 构建完成！")`,
        },
        {
            title: "第四节：查字典 (Embedding)",
            newWords: "<b>嵌入 (Embedding)</b> = “查字典”：把一个数字变成一排数字，捕捉字母更深层的含义。",
            explanation: "为了理解字母，AI 查阅了一本神奇的字典，每个字母对应一组表示「特征」的数字。",
            code: `import random

class Module:
    def zero_grad(self):
        for p in self.parameters(): p.grad = 0
    def parameters(self): return []

class GPTConfig:
    def __init__(self):
        self.vocab_size = vocab_size
        self.n_embd = 32 # 每个单词查字典查出的特征数
        self.n_head = 4
        self.n_layer = 4
        self.block_size = 16 # 考试时一次看多少个字母

config = GPTConfig()

class Embedding(Module):
    def __init__(self, vocab_size, n_embd):
        self.wte = [[Value(random.uniform(-0.1, 0.1)) for _ in range(n_embd)] for _ in range(vocab_size)]
    def __call__(self, idx):
        return [self.wte[i] for i in idx]
    def parameters(self): return [p for row in self.wte for p in row]

embedding_layer = Embedding(config.vocab_size, config.n_embd)
print(f"字典构建完成。每个字母将被翻译成 {config.n_embd} 个特征维度。")`,
        },
        {
            title: "第五节：调平分数 (RMSNorm)",
            newWords: "<b>均方根归一化 (RMSNorm)</b> = “调平分数”：防止某些数字太大导致 AI「偏科」。",
            explanation: "在考试前，我们要把大家的卷面分调整到同一水平线，防止某些题目分值过高。",
            code: `class RMSNorm(Module):
    def __init__(self, dim):
        self.weight = [Value(1.0) for _ in range(dim)]
    def __call__(self, x):
        # x: list of list of Value (T, C)
        out = []
        for row in x:
            ss = sum((v**2 for v in row)) / len(row)
            inv_std = (ss + 1e-5)**-0.5
            out.append([(v * inv_std) * w for v, w in zip(row, self.weight)])
        return out
    def parameters(self): return self.weight

norm_layer = RMSNorm(config.n_embd)
print("调平分数组件 (RMSNorm) 就绪。")`,
        },
        {
            title: "第六节：互相看看 (Attention)",
            newWords: "<b>注意力机制 (Attention)</b> = “互相看看”：让每个字母看看周围的字母，理解语境。Softmax = “变成概率”。",
            explanation: "这是 GPT 最关键的一步。字母不再孤立，它们会互相交流：「你在我前面，那下一个大概率是...」。",
            code: `class CausalSelfAttention(Module):
    def __init__(self, config):
        n_embd = config.n_embd
        self.c_attn = [[Value(random.uniform(-0.1, 0.1)) for _ in range(3 * n_embd)] for _ in range(n_embd)]
        self.c_proj = [[Value(random.uniform(-0.1, 0.1)) for _ in range(n_embd)] for _ in range(n_embd)]
        self.n_embd = n_embd

    def __call__(self, x):
        T, C = len(x), len(x[0])
        # 简化版 Attention 演示逻辑
        print(f" (正在让 {T} 个位置的字母互相打分交流...) ")
        # 实际代码会在这里计算 Q, K, V 并做 Masked Attention
        return x 
    
    def parameters(self):
        params = []
        for row in self.c_attn: params.extend(row)
        for row in self.c_proj: params.extend(row)
        return params

attention = CausalSelfAttention(config)
print("交流机制 (Attention) 构建完成。")`,
        },
        {
            title: "第七节：想一想 (MLP)",
            newWords: "<b>多层感知机 (MLP)</b> = “想一想”：在看完了周围环境后，AI 进行一次内部逻辑推理。",
            explanation: "交流完之后，每个字母都要在心里默默「想一想」，整合信息。",
            code: `class MLP(Module):
    def __init__(self, config):
        n_embd = config.n_embd
        self.c_fc = [[Value(random.uniform(-0.1, 0.1)) for _ in range(4 * n_embd)] for _ in range(n_embd)]
        self.c_proj = [[Value(random.uniform(-0.1, 0.1)) for _ in range(n_embd)] for _ in range(4 * n_embd)]

    def __call__(self, x):
        # 模拟推理过程
        return x
    
    def parameters(self):
        params = []
        for row in self.c_fc: params.extend(row)
        for row in self.c_proj: params.extend(row)
        return params

mlp = MLP(config)
print("思考模块 (MLP) 构建完成。")`,
        },
        {
            title: "第八节：批改批注 (Adam Optimizer)",
            newWords: "<b>Adam 优化器 (Optimizer)</b> = “批改批注”：根据错误调整参数。Gradient = “批改批注”。",
            explanation: "考试错了没关系，关键是根据「批注」修改大脑。Adam 会聪明地决定改多快。",
            code: `class Adam:
    def __init__(self, params, lr=1e-3):
        self.params = params
        self.lr = lr
        self.m = [0 for _ in params]
        self.v = [0 for _ in params]
        self.t = 0

    def step(self):
        self.t += 1
        for i, p in enumerate(self.params):
            if p.grad == 0: continue
            self.m[i] = 0.9 * self.m[i] + 0.1 * p.grad
            self.v[i] = 0.999 * self.v[i] + 0.001 * (p.grad**2)
            m_hat = self.m[i] / (1 - 0.9**self.t)
            v_hat = self.v[i] / (1 - 0.999**self.t)
            p.data -= self.lr * m_hat / (v_hat**0.5 + 1e-8)

print("智能批改系统 (Adam) 已就位。")`,
        },
        {
            title: "第九节：备考训练 (Training Loop)",
            newWords: "<b>查漏补缺 (Training)</b> = 这是一个不断被批改、然后修正的过程。20 步训练开始！",
            explanation: "开始 20 次练习！AI 会不断尝试预测下一个字母，被批改，然后进步。",
            code: `print("开始 20 步模拟训练（基于 Karpathy 原理）...")
# 模拟一些可学习参数
params = [Value(random.uniform(-0.5, 0.5)) for _ in range(50)]
optimizer = Adam(params, lr=0.1)

for i in range(20):
    # 模拟 Loss: 我们希望所有的值最终都变成 0
    loss = sum(p**2 for p in params)
    for p in params: p.grad = 0
    loss.backward()
    optimizer.step()
    if i % 5 == 0:
        print(f"训练第 {i} 步: 当前错误率 (Loss) = {loss.data:.4f}")

print("训练完成！错误率已大幅下降。")`,
        },
        {
            title: "第十节：最终考试 (Inference)",
            newWords: "<b>推理 (Inference)</b> = “正式考试”：不看答案，让 AI 凭感觉写出新的名字。",
            explanation: "现在，让我们输入一个字母 'A'，看 AI 能不能接下去写出一个名字！",
            code: `def generate(start_char, length=5):
    res = [start_char]
    for _ in range(length):
        # 模拟根据概率“查字典”并选出下一个字母
        next_idx = random.randint(0, vocab_size - 1)
        next_char = itos[next_idx]
        res.append(next_char)
    return ''.join(res)

print("--- AI 生成的参考答案 ---")
for _ in range(5):
    name = generate('A', random.randint(3, 7))
    print(f"考卷生成的建议名字: {name}")

print("\\n恭喜你！你已经通过 10 个步骤理解了 GPT 的核心工作流。")`,
        }
    ];

    let pyodide;
    const stepsContainer = document.getElementById('steps-container');
    const runAllBtn = document.getElementById('run-all');
    const loadingOverlay = document.getElementById('loading-overlay');

    // 初始化 Pyodide
    async function initPyodide() {
        pyodide = await loadPyodide();
        loadingOverlay.style.display = 'none';
        console.log("Pyodide Ready");
    }

    // 创建步骤 UI
    function createSteps() {
        STEPS.forEach((step, index) => {
            const card = document.createElement('div');
            card.className = 'step-card';
            card.id = `step-${index}`;
            card.innerHTML = `
                <div class="step-header">
                    <div class="step-title"><span>${index + 1}.</span> ${step.title}</div>
                    <div class="new-words">${step.newWords}</div>
                </div>
                <div class="explanation">${step.explanation}</div>
                <div class="code-editor">
                    <textarea id="code-${index}" spellcheck="false" rows="${step.code.split('\n').length + 2}">${step.code.trim()}</textarea>
                    <div class="run-bar">
                        <div class="status-info">支持 Shift + Enter 运行</div>
                        <button class="run-btn" onclick="runStep(${index})">运行此块</button>
                    </div>
                </div>
                <div class="progress-container"><div class="progress-bar" id="progress-${index}"></div></div>
                <div class="output-area" id="output-${index}"></div>
            `;
            stepsContainer.appendChild(card);

            const textarea = card.querySelector('textarea');
            textarea.addEventListener('keydown', (e) => {
                if (e.shiftKey && e.key === 'Enter') {
                    e.preventDefault();
                    runStep(index);
                }
            });
        });
    }

    // 运行单个步骤
    async function runStep(index) {
        const card = document.getElementById(`step-${index}`);
        const output = document.getElementById(`output-${index}`);
        const progressBar = document.getElementById(`progress-${index}`);
        const code = document.getElementById(`code-${index}`).value;
        const btn = card.querySelector('.run-btn');

        card.classList.remove('done');
        card.classList.add('running');
        output.classList.add('show');
        output.innerHTML = "正在运行 Python 代码...\n";
        btn.disabled = true;

        const startTime = performance.now();
        
        // 捕获 stdout
        await pyodide.runPythonAsync(`
import sys
import io
sys.stdout = io.StringIO()
        `);

        try {
            progressBar.style.width = "40%";
            await pyodide.runPythonAsync(code);
            progressBar.style.width = "100%";
            
            const logs = await pyodide.runPythonAsync("sys.stdout.getvalue()");
            const duration = ((performance.now() - startTime) / 1000).toFixed(2);
            output.innerHTML = (logs || "代码运行结束，无输出。") + `\n\n[运行成功 - 耗时 ${duration}s]`;
            card.classList.remove('running');
            card.classList.add('done');
        } catch (err) {
            output.innerHTML += `<span style="color: #ff5555;">\n错误详情: ${err.message}</span>`;
            card.classList.remove('running');
        } finally {
            btn.disabled = false;
        }
    }

    // 全部运行
    runAllBtn.onclick = async () => {
        runAllBtn.disabled = true;
        for (let i = 0; i < STEPS.length; i++) {
            await runStep(i);
            document.getElementById(`step-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        runAllBtn.disabled = false;
    };

    // 重置
    document.getElementById('reset-btn').onclick = () => {
        location.reload();
    };

    // 启动
    initPyodide().then(createSteps);

</script>
</body>
